---
# Molecule configuration for the Prosumer Edge Media Hub — "The Host"
# Spec-Driven: all settings derived strictly from CONSTITUTION.md, ARCHITECTURE.md,
# PRODUCT_SPECIFICATION.md, and AGENTS.md.

driver:
  name: vagrant

# Vagrant provider: libvirt (KVM-backed) for bare-metal fidelity on Debian 13 "Trixie"
# as mandated by CONSTITUTION.md §3 Non-Negotiable Tech Stack Choices.
provider:
  name: libvirt

platforms:
  # "The Host" — Ubiquitous Language from PRODUCT_SPECIFICATION.md §1:
  #   "The physical Intel N100 Mini-PC running Debian 13."
  - name: the-host
    box: debian/trixie64        # Debian 13 "Trixie" — CONSTITUTION.md §3
    memory: 2048                # 2 GB RAM; mirrors SABnzbd container limit in ARCHITECTURE.md §3
    cpus: 2                     # 2 vCPUs; mirrors SABnzbd container CPU limit in ARCHITECTURE.md §3

provisioner:
  name: ansible
  playbooks:
    converge: ../playbooks/deploy.yml   # Card 2 must satisfy this path (TDI contract)

verifier:
  name: testinfra
