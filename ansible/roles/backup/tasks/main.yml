---
- name: Backup | Create restic configuration directory
  ansible.builtin.file:
    path: /etc/restic
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Backup | Generate restic password
  ansible.builtin.copy:
    content: "{{ lookup('password', playbook_dir + '/../credentials/restic.password chars=ascii_letters,digits length=32') }}"
    dest: "{{ restic_password_file }}"
    owner: root
    group: root
    mode: '0400'
  delegate_to: localhost
  become: false

- name: Backup | Push restic password to host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../credentials/restic.password"
    dest: "{{ restic_password_file }}"
    owner: root
    group: root
    mode: '0400'

- name: Backup | Install restic package
  ansible.builtin.apt:
    name: restic
    state: present

- name: Backup | Initialize restic repository if not already present
  ansible.builtin.command:
    cmd: "restic -r {{ restic_repo }} -p {{ restic_password_file }} init"
    creates: "{{ restic_repo }}/config"
  register: restic_init
  environment:
    RESTIC_REPOSITORY: "{{ restic_repo }}"
    RESTIC_PASSWORD_FILE: "{{ restic_password_file }}"

- name: Backup | Create restic backup script
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /usr/local/bin/restic-backup.sh
    owner: root
    group: root
    mode: '0755'

- name: Backup | Create systemd service for restic backup
  ansible.builtin.template:
    src: restic-backup.service.j2
    dest: /etc/systemd/system/restic-backup.service
    owner: root
    group: root
    mode: '0644'
  notify: systemd daemon-reload

- name: Backup | Create systemd timer for restic backup
  ansible.builtin.template:
    src: restic-backup.timer.j2
    dest: /etc/systemd/system/restic-backup.timer
    owner: root
    group: root
    mode: '0644'
  notify: systemd daemon-reload

- name: Backup | Enable and start systemd timer
  ansible.builtin.systemd:
    name: restic-backup.timer
    state: started
    enabled: true
