---
# Default settings for restic backup
restic_version: "0.17.3"
restic_install_path: "/usr/local/bin/restic"
restic_user: "mediasvc"
restic_group: "mediasvc"

# Backup configuration
restic_backup_source: "/opt/mediastack/appdata"
restic_repo: "/opt/mediastack/backups"
restic_password_file: "/etc/restic/password"

# Retention policy
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6

# Systemd timer settings
restic_timer_on_calendar: "daily"
restic_timer_randomized_delay: "1h"
