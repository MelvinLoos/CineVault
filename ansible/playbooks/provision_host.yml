---
- name: Provision The Host (Intel N100 Mini-PC running Debian 13 "Trixie")
  hosts: the_host
  become: true
  vars:
    # PUID/PGID for the mediasvc user, as mandated by ARCHITECTURE.md for Zero Root Execution.
    # These values are chosen to be outside the typical system reserved range and common
    # default user IDs, ensuring a deterministic identity for all container operations.
    mediasvc_uid: 5000
    mediasvc_gid: 5000
    media_drive_device: ""

  tasks:
    - name: Hardware Detection - Check if Intel QuickSync GPU is physically present
      ansible.builtin.stat:
        path: /dev/dri/renderD128
      register: quicksync_device
      tags:
        - hardware

    - name: Hardware Detection - Set QuickSync capability fact
      ansible.builtin.set_fact:
        host_has_quicksync: "{{ quicksync_device.stat.exists }}"
      tags:
        - hardware

    - name: System Preparation - Pre-seed GRUB to bypass Legacy BIOS prompts in Vagrant
      ansible.builtin.debconf:
        name: grub-pc
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: 'grub-pc/install_devices', value: '', vtype: 'multiselect' }
        - { question: 'grub-pc/install_devices_empty', value: 'true', vtype: 'boolean' }
      tags:
        - system-preparation

    - name: System Preparation - Update apt package cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: true
        dpkg_options: 'force-confdef,force-confold'
        autoclean: true
        autoremove: true
      environment:
        DEBIAN_FRONTEND: noninteractive
      tags:
        - system-preparation
        - update

    - name: System Preparation - Install required system packages for Docker and Python
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - python3-docker
          - avahi-daemon
        state: present
      tags:
        - system-preparation

    - name: Identity & Zero Root Execution - Create mediasvc group
      ansible.builtin.group:
        name: mediasvc
        gid: "{{ mediasvc_gid }}"
        state: present
        system: true # Mark as a system group
      tags:
        - identity

    - name: Identity & Zero Root Execution - Create dedicated system user mediasvc (non-login, no home directory)
      ansible.builtin.user:
        name: mediasvc
        uid: "{{ mediasvc_uid }}"
        group: mediasvc
        home: /nonexistent # No home directory
        shell: /usr/sbin/nologin # Non-login shell
        state: present
        system: true # Mark as a system user
        create_home: false
      tags:
        - identity

    - name: Hardware Detection - Default QuickSync capability to false
      ansible.builtin.set_fact:
        host_has_quicksync: false
      when: host_has_quicksync is not defined
      tags:
        - hardware

    - name: Identity & Zero Root Execution - Add ansible remote user to the docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags:
        - identity

    - name: File System Architecture - Create /opt/mediastack/ (root)
      ansible.builtin.file:
        path: /opt/mediastack/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create appdata directories (Config state)
      ansible.builtin.file:
        path: "/opt/mediastack/appdata/{{ item }}"
        state: directory
        owner: mediasvc
        group: mediasvc
      loop:
        - jellyfin
        - recyclarr
        - radarr
        - sonarr
        - prowlarr
        - sabnzbd
        - seerr
        - homepage
        - bazarr
        - gluetun
        - qbittorrent
        - tdarr/server
        - tdarr/configs

      tags:
        - filesystem

    - name: Storage - Install required disk management packages
      ansible.builtin.apt:
        name: parted
        state: present
      tags:
        - storage
        - filesystem

    - name: Storage - Check if physical media drive is defined and present
      ansible.builtin.stat:
        path: "{{ media_drive_device }}"
      register: media_drive_stat
      when: media_drive_device != "" # <--- Skips immediately if blank (e.g., during CI)
      tags:
        - storage
        - filesystem

    - name: Storage - Create partition on media drive
      community.general.parted:
        device: "{{ media_drive_device }}"
        number: 1
        state: present
        fs_type: ext4
      when:
        - media_drive_device != ""
        - media_drive_stat.stat is defined
        - media_drive_stat.stat.exists
      tags:
        - storage
        - filesystem

    - name: Storage - Format partition to ext4
      community.general.filesystem:
        fstype: ext4
        dev: "{{ media_drive_device }}1" # Adds '1' to target the first partition (e.g., /dev/sdb1)
      when:
        - media_drive_device != ""
        - media_drive_stat.stat is defined
        - media_drive_stat.stat.exists
      tags:
        - storage
        - filesystem

    - name: Storage - Mount media drive to /opt/mediastack/data
      ansible.posix.mount:
        path: /opt/mediastack/data
        src: "{{ media_drive_device }}1"
        fstype: ext4
        opts: defaults,noexec,nosuid,nodev
        state: mounted
      when:
        - media_drive_device != ""
        - media_drive_stat.stat is defined
        - media_drive_stat.stat.exists
      tags:
        - storage
        - filesystem

    - name: Storage - Set ownership of /opt/mediastack/data
      ansible.builtin.file:
        path: /opt/mediastack/data
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags: [storage, filesystem]

    - name: File System Architecture - Create The Download Client scratch space (SABnzbd active downloads)
      ansible.builtin.file:
        path: /opt/mediastack/data/usenet/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create The Library -  movies (Final destination for Radarr)
      ansible.builtin.file:
        path: /opt/mediastack/data/media/movies/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create The Library -  tv (Final destination for Sonarr)
      ansible.builtin.file:
        path: /opt/mediastack/data/media/tv/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem
    - name: Processing Bounded Context - Create Tdarr transcode cache
      ansible.builtin.file:
        path: /opt/mediastack/data/transcode_cache/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem


    - name: Host Hardening - Install UFW firewall
      ansible.builtin.apt:
        name: ufw
        state: present
      tags: [security]

    - name: Host Hardening - Configure UFW to allow SSH
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
      tags: [security]

    - name: Host Hardening - Enable UFW and drop default inbound
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming
      tags: [security]

    - name: Host Hardening - Disable password authentication for SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH
      tags: [security]

    - name: Host Hardening - Disable root login for SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH
      tags: [security]

    - name: Privacy - Install systemd-resolved package
      ansible.builtin.apt:
        name: systemd-resolved
        state: present
      tags:
        - host
        - dns

    - name: Privacy - Configure Secure DNS (Cloudflare/Quad9) with DNS-over-TLS
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?DNS=', line: 'DNS=1.1.1.1 1.0.0.1 9.9.9.9' }
        - { regexp: '^#?DNSOverTLS=', line: 'DNSOverTLS=yes' }
      register: dns_config
      tags:
        - host
        - dns

    - name: Privacy - Ensure systemd-resolved is running and enabled
      ansible.builtin.systemd:
        name: systemd-resolved
        state: started
        enabled: true
      tags:
        - host
        - dns

    - name: Privacy - Restart DNS and Docker ONLY if DNS config changed
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - systemd-resolved
        - docker
      when: dns_config.changed
      tags:
        - host
        - dns

    - name: Privacy - Symlink resolv.conf to use systemd-resolved
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      tags:
        - host
        - dns

    - name: Host Maintenance - Install unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
      tags:
        - host
        - updates

    - name: Host Maintenance - Ensure unattended-upgrades is enabled and running # FIXED: Ensures it stays on
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: started
        enabled: true
      tags:
        - host
        - updates

    - name: Host Maintenance - Configure automatic updates (20auto-upgrades)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: '0644'
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
      tags:
        - host
        - updates

    - name: Host Maintenance - Configure automatic reboots and cleanup (50unattended-upgrades)
      ansible.builtin.lineinfile:
        path: /etc/apt/apt.conf.d/50unattended-upgrades
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^//?Unattended-Upgrade::Automatic-Reboot ', line: 'Unattended-Upgrade::Automatic-Reboot "true";' }
        - { regexp: '^//?Unattended-Upgrade::Automatic-Reboot-Time ', line: 'Unattended-Upgrade::Automatic-Reboot-Time "04:00";' }
        - { regexp: '^//?Unattended-Upgrade::Remove-Unused-Kernel-Packages ', line: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";' }
        - { regexp: '^//?Unattended-Upgrade::Remove-Unused-Dependencies ', line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";' }
      tags:
        - host
        - updates

    - name: Docker Service - Enable and start the docker systemd service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - docker-service

    - name: Configuration - Ensure local credentials directory exists on control node
      ansible.builtin.file:
        path: "{{ playbook_dir }}/credentials"
        state: directory
      delegate_to: localhost
      become: false
      tags:
        - config

    - name: Configuration - Generate Idempotent API Keys
      ansible.builtin.set_fact:
        radarr_key: "{{ lookup('password', playbook_dir + '/../credentials/radarr.key chars=hexdigits length=32') }}"
        sonarr_key: "{{ lookup('password', playbook_dir + '/../credentials/sonarr.key chars=hexdigits length=32') }}"
        prowlarr_key: "{{ lookup('password', playbook_dir + '/../credentials/prowlarr.key chars=hexdigits length=32') }}"
        bazarr_key: "{{ lookup('password', playbook_dir + '/../credentials/bazarr.key chars=hexdigits length=32') }}"
      tags:
        - config

    - name: Configuration - Pre-seed Servarr API Keys
      ansible.builtin.template:
        src: "../files/servarr/config.xml.j2"
        dest: "/opt/mediastack/appdata/{{ item.app }}/config.xml"
        owner: mediasvc
        group: mediasvc
        mode: '0644'
        force: false
      loop:
        - { app: 'radarr', port: '7878', api_key: "{{ radarr_key }}" }
        - { app: 'sonarr', port: '8989', api_key: "{{ sonarr_key }}" }
        - { app: 'prowlarr', port: '9696', api_key: "{{ prowlarr_key }}" }
      tags:
        - config

    - name: Deploy Stack - Push Homepage Dashboard Configuration
      ansible.builtin.template:
        src: "../files/homepage/{{ item }}.j2"
        dest: "/opt/mediastack/appdata/homepage/{{ item }}"
        owner: mediasvc
        group: mediasvc
        mode: '0644'
      loop:
        - docker.yaml
        - widgets.yaml
        - services.yaml
      tags:
        - deploy
    - name: Deploy Stack - Push Recyclarr Configuration
      ansible.builtin.template:
        src: "../files/recyclarr/recyclarr.yml.j2"
        dest: "/opt/mediastack/appdata/recyclarr/recyclarr.yml"
        owner: mediasvc
        group: mediasvc
        mode: "0644"
      tags:
        - deploy

    - name: Deploy Stack - Template dynamic docker-compose.yml to the host
      ansible.builtin.template:
        src: ../../docker-compose.yml.j2
        dest: /opt/mediastack/docker-compose.yml
        owner: mediasvc
        group: mediasvc
        mode: '0644'
      tags:
        - deploy

    - name: Deploy Stack - Seed host .env from local .env (first run only)
      ansible.builtin.copy:
        src: "{{ lookup('ansible.builtin.first_found', env_seed_candidates) }}"
        dest: /opt/mediastack/.env
        owner: mediasvc
        group: mediasvc
        mode: '0600'
        force: false
      vars:
        env_seed_candidates:
          - "{{ playbook_dir }}/../../.env"
          - "{{ playbook_dir }}/../../.env.example"
      tags:
        - deploy

    - name: Configuration - Inject dynamic API keys into host .env file
      ansible.builtin.lineinfile:
        path: /opt/mediastack/.env
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        create: true
        owner: mediasvc
        group: mediasvc
        mode: '0600'
      loop:
        - { key: 'RADARR_API_KEY', value: "{{ radarr_key }}" }
        - { key: 'SONARR_API_KEY', value: "{{ sonarr_key }}" }
        - { key: 'PROWLARR_API_KEY', value: "{{ prowlarr_key }}" }
        - { key: 'BAZARR_API_KEY', value: "{{ bazarr_key }}" }
        - { key: 'SABNZBD_API_KEY', value: "" }
      tags:
        - config

    - name: Deploy Stack - Synchronize Container Identities with Host Identities
      ansible.builtin.lineinfile:
        path: /opt/mediastack/.env
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: 'PUID', value: "{{ mediasvc_uid }}" }
        - { key: 'PGID', value: "{{ mediasvc_gid }}" }
      tags:
        - deploy

    - name: Deploy Stack - Spin up the Prosumer Media Hub
      community.docker.docker_compose_v2:
        project_src: /opt/mediastack/
        state: present
      register: deploy_result
      until: deploy_result is not failed
      retries: 3
      delay: 10
      tags:
        - deploy

    - name: Backups - Install restic
      ansible.builtin.apt:
        name: restic
        state: present
      tags:
        - backup

    - name: Backups - Create /etc/restic config directory
      ansible.builtin.file:
        path: /etc/restic
        state: directory
        owner: root
        group: root
        mode: '0700'
      tags:
        - backup

    - name: Backups - Generate idempotent repository password on control node
      ansible.builtin.copy:
        content: "{{ lookup('password', playbook_dir + '/../credentials/restic.password chars=ascii_letters,digits length=32') }}"
        dest: "{{ playbook_dir }}/../credentials/restic.password"
        mode: '0600'
      delegate_to: localhost
      become: false
      tags:
        - backup

    - name: Backups - Push repository password file to host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../credentials/restic.password"
        dest: /etc/restic/password
        owner: root
        group: root
        mode: '0400'
      tags:
        - backup

    - name: Backups - Create backup repository directory
      ansible.builtin.file:
        path: /opt/mediastack/backups
        state: directory
        owner: root
        group: root
        mode: '0700'
      tags:
        - backup

    - name: Backups - Initialize restic repository (idempotent)
      ansible.builtin.command:
        cmd: restic -r /opt/mediastack/backups -p /etc/restic/password init
        creates: /opt/mediastack/backups/config
      tags:
        - backup

    - name: Backups - Deploy backup wrapper script
      ansible.builtin.copy:
        dest: /usr/local/bin/restic-backup.sh
        owner: root
        group: root
        mode: '0750'
        content: |
          #!/bin/bash
          set -euo pipefail
          REPO=/opt/mediastack/backups
          PASSWORD_FILE=/etc/restic/password

          restic -r "$REPO" -p "$PASSWORD_FILE" backup /opt/mediastack/appdata

          restic -r "$REPO" -p "$PASSWORD_FILE" forget \
            --keep-daily 7 \
            --keep-weekly 4 \
            --keep-monthly 6 \
            --prune
      tags:
        - backup

    - name: Backups - Deploy restic-backup systemd service unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.service
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Daily restic backup of /opt/mediastack/appdata
          After=network.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/restic-backup.sh
          StandardOutput=journal
          StandardError=journal
      notify: Reload systemd
      tags:
        - backup

    - name: Backups - Deploy restic-backup systemd timer unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/restic-backup.timer
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=Daily restic backup timer for /opt/mediastack/appdata

          [Timer]
          OnCalendar=daily
          RandomizedDelaySec=1h
          Persistent=true

          [Install]
          WantedBy=timers.target
      notify: Reload systemd
      tags:
        - backup

    - name: Backups - Enable and start restic-backup timer
      ansible.builtin.systemd:
        name: restic-backup.timer
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - backup

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: sshd
        state: restarted

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
