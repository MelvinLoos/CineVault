---
- name: Provision The Host (Intel N100 Mini-PC running Debian 13 "Trixie")
  hosts: the_host
  become: true
  vars:
    # PUID/PGID for the mediasvc user, as mandated by ARCHITECTURE.md for Zero Root Execution.
    # These values are chosen to be outside the typical system reserved range and common
    # default user IDs, ensuring a deterministic identity for all container operations.
    mediasvc_uid: 1001
    mediasvc_gid: 1001

  tasks:
    - name: Hardware Detection - Check if Intel QuickSync GPU is physically present
      ansible.builtin.stat:
        path: /dev/dri/renderD128
      register: quicksync_device
      tags:
        - hardware

    - name: Hardware Detection - Set QuickSync capability fact
      ansible.builtin.set_fact:
        host_has_quicksync: "{{ quicksync_device.stat.exists }}"
      tags:
        - hardware

    - name: System Preparation - Pre-seed GRUB to bypass Legacy BIOS prompts in Vagrant
      ansible.builtin.debconf:
        name: grub-pc
        question: "{{ item.question }}"
        value: "{{ item.value }}"
        vtype: "{{ item.vtype }}"
      loop:
        - { question: 'grub-pc/install_devices', value: '', vtype: 'multiselect' }
        - { question: 'grub-pc/install_devices_empty', value: 'true', vtype: 'boolean' }
      tags:
        - system-preparation

    - name: System Preparation - Update apt package cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: true
        dpkg_options: 'force-confdef,force-confold'
        autoclean: true
        autoremove: true
      environment:
        DEBIAN_FRONTEND: noninteractive
      tags:
        - system-preparation
        - update

    - name: System Preparation - Install required system packages for Docker and Python
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - python3-docker
          - avahi-daemon
        state: present
      tags:
        - system-preparation

    - name: Identity & Zero Root Execution - Create mediasvc group
      ansible.builtin.group:
        name: mediasvc
        gid: "{{ mediasvc_gid }}"
        state: present
        system: true # Mark as a system group
      tags:
        - identity

    - name: Identity & Zero Root Execution - Create dedicated system user mediasvc (non-login, no home directory)
      ansible.builtin.user:
        name: mediasvc
        uid: "{{ mediasvc_uid }}"
        group: mediasvc
        home: /nonexistent # No home directory
        shell: /usr/sbin/nologin # Non-login shell
        state: present
        system: true # Mark as a system user
        create_home: false
      tags:
        - identity

    - name: Identity & Zero Root Execution - Add ansible remote user to the docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags:
        - identity

    - name: File System Architecture - Create /opt/mediastack/ (root)
      ansible.builtin.file:
        path: /opt/mediastack/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create appdata directories (Config state)
      ansible.builtin.file:
        path: "/opt/mediastack/appdata/{{ item }}"
        state: directory
        owner: mediasvc
        group: mediasvc
      loop:
        - jellyfin
        - radarr
        - sonarr
        - prowlarr
        - sabnzbd
        - seerr
        - homepage
      tags:
        - filesystem

    - name: File System Architecture - Create The Download Client scratch space (SABnzbd active downloads)
      ansible.builtin.file:
        path: /opt/mediastack/data/usenet/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create The Library -  movies (Final destination for Radarr)
      ansible.builtin.file:
        path: /opt/mediastack/data/media/movies/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: File System Architecture - Create The Library -  tv (Final destination for Sonarr)
      ansible.builtin.file:
        path: /opt/mediastack/data/media/tv/
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: '0755'
      tags:
        - filesystem

    - name: Host Hardening - Install UFW firewall
      ansible.builtin.apt:
        name: ufw
        state: present
      tags: [security]

    - name: Host Hardening - Configure UFW to allow SSH
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp
      tags: [security]

    - name: Host Hardening - Enable UFW and drop default inbound
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming
      tags: [security]

    - name: Host Hardening - Disable password authentication for SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH
      tags: [security]

    - name: Privacy - Install systemd-resolved package
      ansible.builtin.apt:
        name: systemd-resolved
        state: present
      tags:
        - host
        - dns

    - name: Privacy - Configure Secure DNS (Cloudflare/Quad9) with DNS-over-TLS
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?DNS=', line: 'DNS=1.1.1.1 1.0.0.1 9.9.9.9' }
        - { regexp: '^#?DNSOverTLS=', line: 'DNSOverTLS=yes' }
      register: dns_config
      tags:
        - host
        - dns

    - name: Privacy - Ensure systemd-resolved is running and enabled
      ansible.builtin.systemd:
        name: systemd-resolved
        state: started
        enabled: true
      tags:
        - host
        - dns

    - name: Privacy - Restart DNS and Docker ONLY if DNS config changed
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - systemd-resolved
        - docker
      when: dns_config.changed
      tags:
        - host
        - dns

    - name: Privacy - Symlink resolv.conf to use systemd-resolved
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
      tags:
        - host
        - dns

    - name: Host Maintenance - Install unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
      tags:
        - host
        - updates

    - name: Host Maintenance - Ensure unattended-upgrades is enabled and running # FIXED: Ensures it stays on
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: started
        enabled: true
      tags:
        - host
        - updates

    - name: Docker Service - Enable and start the docker systemd service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - docker-service

    - name: Configuration - Ensure local credentials directory exists on control node
      ansible.builtin.file:
        path: "{{ playbook_dir }}/credentials"
        state: directory
      delegate_to: localhost
      become: false
      tags:
        - config

    - name: Configuration - Generate Idempotent API Keys
      ansible.builtin.set_fact:
        radarr_key: "{{ lookup('password', playbook_dir + '/../credentials/radarr.key chars=hexdigits length=32') }}"
        sonarr_key: "{{ lookup('password', playbook_dir + '/../credentials/sonarr.key chars=hexdigits length=32') }}"
        prowlarr_key: "{{ lookup('password', playbook_dir + '/../credentials/prowlarr.key chars=hexdigits length=32') }}"
      tags:
        - config

    - name: Configuration - Inject dynamic API keys into host .env file
      ansible.builtin.lineinfile:
        path: /opt/mediastack/.env
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        create: true
        owner: mediasvc
        group: mediasvc
        mode: '0600'
      loop:
        - { key: 'RADARR_API_KEY', value: "{{ radarr_key }}" }
        - { key: 'SONARR_API_KEY', value: "{{ sonarr_key }}" }
        - { key: 'PROWLARR_API_KEY', value: "{{ prowlarr_key }}" }
        - { key: 'SABNZBD_API_KEY', value: "" }
      tags:
        - config

    - name: Configuration - Pre-seed Servarr API Keys
      ansible.builtin.template:
        src: "../files/servarr/config.xml.j2"
        dest: "/opt/mediastack/appdata/{{ item.app }}/config.xml"
        owner: mediasvc
        group: mediasvc
        mode: '0644'
        force: false
      loop:
        - { app: 'radarr', port: '7878', api_key: "{{ radarr_key }}" }
        - { app: 'sonarr', port: '8989', api_key: "{{ sonarr_key }}" }
        - { app: 'prowlarr', port: '9696', api_key: "{{ prowlarr_key }}" }
      tags:
        - config

    - name: Deploy Stack - Push Homepage Dashboard Configuration
      ansible.builtin.template:
        src: "../files/homepage/{{ item }}.j2"
        dest: "/opt/mediastack/appdata/homepage/{{ item }}"
        owner: mediasvc
        group: mediasvc
        mode: '0644'
      loop:
        - docker.yaml
        - widgets.yaml
        - services.yaml
      tags:
        - deploy

    - name: Deploy Stack - Template dynamic docker-compose.yml to the host
      ansible.builtin.template:
        src: ../../docker-compose.yml.j2
        dest: /opt/mediastack/docker-compose.yml
        owner: mediasvc
        group: mediasvc
        mode: '0644'
      tags:
        - deploy

    - name: Deploy Stack - Copy .env.example to .env
      ansible.builtin.copy:
        src: ../../.env.example
        dest: /opt/mediastack/.env
        owner: mediasvc
        group: mediasvc
        mode: '0600'
        force: false
      tags:
        - deploy

    - name: Deploy Stack - Synchronize Container Identities with Host Identities
      ansible.builtin.lineinfile:
        path: /opt/mediastack/.env
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: 'PUID', value: "{{ mediasvc_uid }}" }
        - { key: 'PGID', value: "{{ mediasvc_gid }}" }
      tags:
        - deploy

    - name: Deploy Stack - Spin up the Prosumer Media Hub
      community.docker.docker_compose_v2:
        project_src: /opt/mediastack/
        state: present
      register: deploy_result
      until: deploy_result is not failed
      retries: 3
      delay: 10
      tags:
        - deploy

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: sshd
        state: restarted
