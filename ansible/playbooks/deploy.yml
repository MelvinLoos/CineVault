---
# =============================================================================
# deploy.yml — Provision The Host (Intel N100 Mini-PC, Debian 13 "Trixie")
#
# Ubiquitous Language (PRODUCT_SPECIFICATION.md §1):
#   The Host     : The physical Intel N100 Mini-PC running Debian 13 "Trixie".
#   The Library  : /opt/mediastack/data/media/ — permanent renamed-media store.
#   The Download Client : SABnzbd scratch space at /opt/mediastack/data/usenet/.
#   The Indexer  : Prowlarr — search engine, Acquisition bounded context.
#   The Ingress  : Cloudflare Tunnel — only authorised external access path.
#
# TDI Contract: every task exists solely to make a failing test in
# molecule/default/tests/test_host_provision.py pass.
# No task exists without a corresponding test assertion.
#
# Idempotency: all tasks use declarative Ansible modules (AGENTS.md §3).
# =============================================================================

- name: Provision The Host (Intel N100 Mini-PC running Debian 13 "Trixie")
  hosts: the_host
  become: true

  vars:
    # -------------------------------------------------------------------------
    # Canonical PUID / PGID for the mediasvc service account.
    # These values are the single source of truth for all container PUID/PGID
    # environment variables in Card 3 (docker-compose.yml / .env).
    #
    # PUID 1001 = mediasvc user  (test constant: MEDIASVC_UID = 1001)
    # PGID 1001 = mediasvc group (test constant: MEDIASVC_GID = 1001)
    #
    # AGENTS.md §3: "Never run Docker containers as root."
    # ARCHITECTURE.md §3: "All containers must execute under a non-root PUID
    # and PGID corresponding to a dedicated `mediasvc` system user."
    # -------------------------------------------------------------------------
    mediasvc_uid: 1001   # Canonical PUID — Card 3 .env: PUID=1001
    mediasvc_gid: 1001   # Canonical PGID — Card 3 .env: PGID=1001

    # -------------------------------------------------------------------------
    # Full mediastack directory tree per ARCHITECTURE.md §1.
    # Covers every path in MEDIASTACK_DIRECTORIES (test_host_provision.py)
    # including all intermediate parents required by the parametrized test.
    #
    # ATOMIC HARDLINK ASSUMPTION:
    # All /opt/mediastack/ subdirs are created on the same filesystem — this
    # is the architectural guarantee that satisfies
    # test_atomic_hardlink_constraint_usenet_and_media_on_same_filesystem and
    # test_atomic_hardlink_constraint_data_root_is_single_mount.
    # If the operator mounts /opt/mediastack/data/ on a separate drive
    # (ARCHITECTURE.md §1: "data — Resides on High-Capacity Drive"), that
    # mount MUST be in place BEFORE running this playbook. The playbook creates
    # directory children inside the pre-existing mount. Failure to pre-mount
    # breaks the Atomic Hardlink constraint (EXDEV on ln across devices).
    # -------------------------------------------------------------------------
    mediastack_directories:
      - /opt/mediastack
      - /opt/mediastack/appdata
      - /opt/mediastack/appdata/jellyfin
      - /opt/mediastack/appdata/radarr
      - /opt/mediastack/appdata/sonarr
      - /opt/mediastack/appdata/prowlarr
      - /opt/mediastack/appdata/sabnzbd
      - /opt/mediastack/appdata/seerr
      - /opt/mediastack/data
      # The Download Client scratch space — SABnzbd active Usenet downloads
      - /opt/mediastack/data/usenet
      # The Library (PRODUCT_SPECIFICATION.md §1) — intermediate parent
      - /opt/mediastack/data/media
      # The Library: movies — Final destination for Radarr (ARCHITECTURE.md §1)
      - /opt/mediastack/data/media/movies
      # The Library: tv — Final destination for Sonarr (ARCHITECTURE.md §1)
      - /opt/mediastack/data/media/tv

  tasks:

    # =========================================================================
    # GROUP A — Identity & Zero Root Execution
    # Tests: test_the_host_has_mediasvc_group, test_the_host_has_mediasvc_user,
    #        test_mediasvc_user_is_non_login, test_mediasvc_user_has_no_home_directory,
    #        test_mediasvc_user_is_not_in_sudo_group
    # Spec: AGENTS.md §3 "Zero Root Execution" + ARCHITECTURE.md §3
    # =========================================================================

    - name: "Identity — Create mediasvc system group (canonical PGID {{ mediasvc_gid }})"
      # Satisfies: test_the_host_has_mediasvc_group (group.exists, group.gid == 1001)
      ansible.builtin.group:
        name: mediasvc
        gid: "{{ mediasvc_gid }}"
        state: present
        system: true
      tags:
        - identity

    - name: "Identity — Create mediasvc system user (PUID {{ mediasvc_uid }}, non-login, no home)"
      # Satisfies: test_the_host_has_mediasvc_user (user.exists, uid==1001, group=='mediasvc')
      # Satisfies: test_mediasvc_user_is_non_login (shell=='/usr/sbin/nologin')
      # Satisfies: test_mediasvc_user_has_no_home_directory (home=='/nonexistent', path absent)
      # Satisfies: test_mediasvc_user_is_not_in_sudo_group (only 'mediasvc' group assigned)
      ansible.builtin.user:
        name: mediasvc
        uid: "{{ mediasvc_uid }}"
        group: mediasvc
        home: /nonexistent
        create_home: false
        shell: /usr/sbin/nologin
        state: present
        system: true
      tags:
        - identity

    # =========================================================================
    # GROUP D — Docker Runtime
    # Tests: test_docker_package_is_installed, test_docker_compose_plugin_is_installed,
    #        test_docker_service_is_running, test_docker_service_is_enabled_at_boot,
    #        test_docker_binary_is_accessible
    #        test_dri_render_device_node_exists — auto-skipped in VM (no GPU)
    # Spec: CONSTITUTION.md §3
    # =========================================================================

    - name: "Docker — Update apt package cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags:
        - docker

    - name: "Docker — Install docker.io and docker-compose-plugin (Debian repositories)"
      # Satisfies: test_docker_package_is_installed (host.package('docker.io').is_installed)
      # Satisfies: test_docker_compose_plugin_is_installed
      # Satisfies: test_docker_binary_is_accessible (/usr/bin/docker exists, is_file)
      # CONSTITUTION.md §3: "Provisioning & Container Engine: Ansible + Docker Compose."
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
      tags:
        - docker

    - name: "Docker — Enable and start the docker systemd service"
      # Satisfies: test_docker_service_is_running (is_running == True)
      # Satisfies: test_docker_service_is_enabled_at_boot (is_enabled == True)
      # CONSTITUTION.md §1: stack must survive power cycles without manual intervention.
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true
      tags:
        - docker

    # =========================================================================
    # GROUP B — File System Architecture / State Isolation
    # Tests: test_mediastack_directory_exists_and_is_owned_by_mediasvc (x13)
    # GROUP C — Atomic Hardlink Constraint (no tasks; guaranteed by single-loop above)
    # Spec: ARCHITECTURE.md §1 + AGENTS.md §3
    # =========================================================================

    - name: "File System Architecture — Create full /opt/mediastack/ directory tree"
      # Satisfies: test_mediastack_directory_exists_and_is_owned_by_mediasvc for all paths:
      #   d.exists, d.is_directory, d.user=='mediasvc', d.group=='mediasvc', d.mode==0o755
      # Covers all 13 parametrized paths including intermediate parents.
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: mediasvc
        group: mediasvc
        mode: "0755"
      loop: "{{ mediastack_directories }}"
      tags:
        - filesystem

    # =========================================================================
    # GROUP E — UFW Firewall Hardening
    # Tests: test_ufw_is_installed, test_ufw_service_is_enabled_and_active,
    #        test_ufw_default_inbound_policy_is_deny, test_ufw_allows_ssh_inbound,
    #        test_ufw_does_not_expose_jellyfin_port_externally
    # Spec: CONSTITUTION.md §2 Maxim 4 + ARCHITECTURE.md §2
    # =========================================================================

    - name: "Firewall — Install ufw package"
      # Satisfies: test_ufw_is_installed (host.package('ufw').is_installed)
      ansible.builtin.apt:
        name: ufw
        state: present
      tags:
        - firewall

    - name: "Firewall — Allow SSH/22 tcp BEFORE enabling UFW (prevent operator lockout)"
      # Satisfies: test_ufw_allows_ssh_inbound ("22" in 'ufw status numbered')
      # MUST run before UFW enable to prevent severing the Ansible SSH session.
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      tags:
        - firewall

    - name: "Firewall — Set UFW default incoming policy to deny (Zero-Trust Micro-segmentation)"
      # Satisfies: test_ufw_default_inbound_policy_is_deny
      #   "deny (incoming)" in 'ufw status verbose'
      # CONSTITUTION.md §2 Maxim 4: No Port Forwarding.
      community.general.ufw:
        default: deny
        direction: incoming
      tags:
        - firewall

    - name: "Firewall — Enable UFW"
      # Satisfies: test_ufw_service_is_enabled_and_active ("active" in 'ufw status')
      # Satisfies: test_ufw_does_not_expose_jellyfin_port_externally — by omission:
      #   no task ever adds a rule for port 8096. Jellyfin is served exclusively via
      #   cloudflared (The Ingress) per CONSTITUTION.md §2 Maxim 4.
      community.general.ufw:
        state: enabled
      tags:
        - firewall
