[defaults]
# Inventory path relative to this ansible.cfg (ansible/inventory/hosts.ini)
inventory        = inventory/hosts.ini
# Disable host key checking for lab/CI convenience (Molecule + fresh VMs).
host_key_checking = False
# SSH connection timeout in seconds.
timeout          = 30
# Default remote user for all plays targeting The Host.
remote_user      = ansible

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
control_path_dir = /tmp/.ansible-cp-%h-%p-%r
