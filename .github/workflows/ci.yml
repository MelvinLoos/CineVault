---
# CI workflow: validates that The Host provisioning playbook produces
# a correctly configured environment by executing the full Molecule
# lifecycle (create → converge → verify → destroy) with the Testinfra
# contract suite on every push and pull request to main.

name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  molecule-testinfra:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM group permissions
        # Required for nested virtualisation: the Vagrant/libvirt driver
        # spins up a Debian 13 VM to host The Host provisioning playbook.
        run: |
          RULE='KERNEL=="kvm", GROUP="kvm", MODE="0666",'
          RULE="${RULE}"' OPTIONS+="static_node=kvm"'
          echo "${RULE}" \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Virtualization & HashiCorp Dependencies
        run: |
          # 1. Install KVM and libvirt dependencies
          sudo apt-get update -qq
          sudo apt-get install -y qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils
          
          # 2. Add HashiCorp GPG Key and APT Repository
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          
          # 3. Update APT cache again and install Vagrant + Plugin compilers
          sudo apt-get update -qq
          sudo apt-get install -y vagrant libvirt-dev ruby-libvirt libxml2-dev libxslt-dev zlib1g-dev
          
          sudo systemctl enable --now libvirtd
          sudo usermod -aG libvirt,kvm "${USER}"

      - name: Install Python Toolchain (Molecule & Plugins)
        run: |
          # Move to the home directory to prevent pipx from confusing the venv 
          # name with the local 'molecule/' directory in our repository
          cd ~
          
          # Install Molecule
          pipx install molecule
          
          # Inject the required plugins
          pipx inject molecule "molecule-plugins[vagrant]"
          pipx inject molecule pytest-testinfra
          pipx inject molecule python-vagrant

      - name: Run molecule test
        # Executes the full Molecule lifecycle against The Host provisioning
        # playbook: create → converge → verify (Testinfra contract) → destroy.
        # Intentionally NOT marked continue-on-error: an infrastructure test
        # failure must fail the job.
        id: molecule
        run: molecule test
        working-directory: .

      - name: Upload infrastructure test report
        # Persists the Testinfra JUnit XML report so engineers can inspect
        # failures even when the Testinfra contract step above has failed.
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-report
          path: infrastructure-report.xml
          if-no-files-found: warn
